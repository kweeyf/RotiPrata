version: "3.9"

services:
  backend:
    build: 
      dockerfile: Dockerfile.backend
    image: cs203/backend
    container_name: backend
    env_file:
      - .env
    ports:
      - "${PORT}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${BACKEND_URL:-http://backend:8080}  
    image: cs203/frontend
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend